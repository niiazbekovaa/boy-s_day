<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* 🌌 BACKGROUND */
.bg {
    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 200%;

    background-image: url("zerdelim.jpg");
    background-repeat: repeat;
    background-size: 180px 180px;

    opacity: 0.18;

    animation: moveUpDown 8s ease-in-out infinite alternate;

    z-index: -2;
}

@keyframes moveUpDown {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10%); }
}

/* 🌑 DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* 💌 ENVELOPE */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 260px;
    height: 160px;
    transform: translate(-50%, -50%);
    cursor: pointer;
}

.base {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff9a9e, #fad0c4);
    border-radius: 12px;
    position: absolute;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff758c, #ff7eb3);
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: 0.8s;
}

.open .flap {
    transform: rotateX(180deg);
}

.letter {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.8s;
}

.open .letter {
    transform: translateY(-180px);
}

/* 🎴 CARD */
.card {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    width: 320px;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* ✨ CONFETTI */
.confetti {
    position: absolute;
    font-size: 18px;
    animation: fall linear forwards;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎵 MUSIC -->
<audio id="music" src="Seniizdeim.mp3"></audio>

<div class="envelope" id="env" onclick="openLetter()">
    <div class="base"></div>
    <div class="flap"></div>
    <div class="letter">💌</div>
</div>

<div class="card" id="card">
    <h2>💖 Dear, Zerdeli Boy's</h2>
    <p>Сіздерді Отан қорғаушылар күніне арналған мерекелік кешіміздің қонағы болуға шақырамыз!</p>
    <p>📅 May 7<br>⏰ 17:00<br>🏫 Zerdeli School</p>
</div>

<script>

function createConfetti() {
    const symbols = ["✨","💖","🎉","💫","🌸","⭐"];

    for (let i = 0; i < 80; i++) {
        let c = document.createElement("div");
        c.className = "confetti";

        c.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

        c.style.left = Math.random() * 100 + "vw";
        c.style.top = Math.random() * -100 + "px";

        c.style.fontSize = (Math.random() * 20 + 10) + "px";
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 4000);
    }
}

function openLetter() {
    document.getElementById("env").classList.add("open");

    // 🎵 MUSIC PLAY
    const music = document.getElementById("music");
    music.play();

    setTimeout(() => {
        document.getElementById("card").style.display = "block";
    }, 800);

    createConfetti();
}

</script>

</body>
</html>
